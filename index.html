<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ButtBook - Minimalist Abstract Community</title>
    <!-- 引入 Firebase 核心库和实时数据库库 -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #121212;
            --border-color: #262626;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent-color: #ff9a9e; /* 淡淡的蜜桃粉，契合 Butt 主题 */
            --accent-hover: #ffb8bb;
            --danger: #ff5252;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* 隐藏滚动条但保留滚动功能 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0 0 10px 0;
            color: #fff;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .screen {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }

        #main-screen { display: none; }

        .auth-container {
            max-width: 400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2, h3 {
            font-weight: 500;
            margin-top: 0;
        }

        h2 { font-size: 1.2rem; color: #fff; margin-bottom: 20px; text-align: center; }
        h3 { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }

        input {
            background: var(--bg-color);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: var(--text-muted);
        }

        button {
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        button:hover {
            background: #fff;
            transform: translateY(-1px);
        }

        button.secondary {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        button.secondary:hover {
            background: var(--border-color);
        }

        .chat-section {
            margin-bottom: 30px;
        }

        .chat-box {
            height: 280px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            background: var(--bg-color);
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .post {
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-all;
        }

        .post-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .author {
            color: var(--accent-color);
            font-weight: 500;
        }

        .private-msg {
            color: #fff;
            position: relative;
            padding-left: 12px;
            border-left: 2px solid var(--accent-color);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group button {
            width: auto;
            white-space: nowrap;
        }

        .flex-row {
            display: flex;
            gap: 10px;
        }

        #error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            text-align: center;
            min-height: 20px;
            margin: 0;
        }

        .user-badge {
            display: inline-block;
            background: var(--border-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🍑 ButtBook</h1>
            <div class="subtitle">Earth's Most Abstract Community • Hand over your soul</div>
        </div>

        <!-- 登录注册界面 -->
        <div id="auth-screen" class="screen">
            <div class="auth-container">
                <h2>System Authentication</h2>
                <input type="text" id="username" placeholder="输入炫酷的网名 (Username)">
                <input type="password" id="password" placeholder="密码随便填 (Password)">
                <button onclick="login()">Initialize / 冲进论坛</button>
                <p id="error-msg"></p>
            </div>
        </div>

        <!-- 主界面 -->
        <div id="main-screen" class="screen">
            <div class="user-badge">
                Current Entity: <span id="my-name" style="color: var(--accent-color); font-weight: 600;"></span>
            </div>
            
            <!-- 公共大厅 -->
            <div class="chat-section">
                <h3>Public Channel / 全球乱聊大厅</h3>
                <div id="public-forum" class="chat-box"></div>
                <div class="input-group">
                    <input type="text" id="post-input" placeholder="在世界频道大喊大叫...">
                    <button onclick="sendPublicPost()">Broadcast</button>
                </div>
            </div>

            <!-- 私信与加好友 -->
            <div class="chat-section" style="margin-bottom: 0;">
                <h3>Encrypted Channel / 私密小纸条</h3>
                <div id="private-forum" class="chat-box" style="height: 200px;"></div>
                <div class="flex-row" style="margin-bottom: 10px;">
                    <input type="text" id="target-user" placeholder="Target ID (对方网名)" style="width: 30%;">
                    <input type="text" id="private-input" placeholder="输入悄悄话..." style="flex: 1;">
                </div>
                <div class="flex-row">
                    <button onclick="sendPrivatePost()">Send Whisper</button>
                    <button class="secondary" onclick="addFriend()">Force Add Friend / 强行加好友</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 你的专属 Firebase 配置保持不变
        const firebaseConfig = {
            apiKey: "AIzaSyC1nVrI-0OxtIuWSPgJhyQy1wtjnzFxqyw",
            authDomain: "buttbook-898e7.firebaseapp.com",
            databaseURL: "https://buttbook-898e7-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "buttbook-898e7",
            storageBucket: "buttbook-898e7.firebasestorage.app",
            messagingSenderId: "676893745540",
            appId: "1:676893745540:web:06626e592fad8caf7e3dd1",
            measurementId: "G-0LKV4PLEEJ"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myUsername = '';

        // --- 登录/注册逻辑 ---
        function login() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            if(!u || !p) {
                errorMsg.innerText = "Error: 网名和密码呢？被你吃了？";
                return;
            }

            db.ref('users/' + u).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    if (snapshot.val().password === p) {
                        enterForum(u);
                    } else {
                        errorMsg.innerText = "Error: 密码错了笨蛋！是不是想盗号？";
                    }
                } else {
                    db.ref('users/' + u).set({ password: p }).then(() => {
                        db.ref('public_posts').push({
                            author: '🍑 宇宙广播',
                            text: `新鲜的屁股【${u}】注册了！大家快嘲笑ta！`,
                            time: new Date().toLocaleTimeString()
                        });
                        enterForum(u);
                    });
                }
            });
        }

        function enterForum(username) {
            myUsername = username;
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('my-name').innerText = username;
            loadMessages();
        }

        // --- 发送公共消息 ---
        function sendPublicPost() {
            const input = document.getElementById('post-input');
            if (input.value.trim() !== '') {
                db.ref('public_posts').push({
                    author: myUsername,
                    text: input.value,
                    time: new Date().toLocaleTimeString()
                });
                input.value = '';
            }
        }

        // --- 发送私信 ---
        function sendPrivatePost() {
            const target = document.getElementById('target-user').value.trim();
            const text = document.getElementById('private-input').value.trim();
            if (target && text) {
                db.ref('private_msgs/' + target).push({
                    from: myUsername, to: target, text: text, time: new Date().toLocaleTimeString()
                });
                if(target !== myUsername) {
                    db.ref('private_msgs/' + myUsername).push({
                        from: myUsername, to: target, text: text, time: new Date().toLocaleTimeString()
                    });
                }
                document.getElementById('private-input').value = '';
                // 使用控制台或者极简的方式代替 alert，保持优雅
                console.log(`Whisper sent to ${target}`); 
            }
        }

        // --- 搞笑加好友 ---
        function addFriend() {
            const target = document.getElementById('target-user').value.trim();
            if(target) {
                db.ref('public_posts').push({
                    author: '🤖 系统嘲讽',
                    text: `哈哈哈哈！【${myUsername}】居然试图强行加【${target}】为好友！醒醒吧，你根本没有朋友！`,
                    time: new Date().toLocaleTimeString()
                });
                alert("Request sent... but was swallowed by a black hole.");
            }
        }

        // 绑定回车键发送
        document.getElementById('post-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendPublicPost();
        });
        document.getElementById('private-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendPrivatePost();
        });
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });

        // --- 实时监听数据库消息 ---
        function loadMessages() {
            db.ref('public_posts').on('child_added', (snapshot) => {
                const post = snapshot.val();
                const box = document.getElementById('public-forum');
                box.innerHTML += `
                    <div class="post">
                        <div class="post-meta"><span class="author">${post.author}</span> • ${post.time}</div>
                        <div>${post.text}</div>
                    </div>`;
                box.scrollTop = box.scrollHeight;
            });

            db.ref('private_msgs/' + myUsername).on('child_added', (snapshot) => {
                const msg = snapshot.val();
                const box = document.getElementById('private-forum');
                let displayTxt = msg.from === myUsername 
                    ? `You whispered to ${msg.to}: ${msg.text}` 
                    : `[Whisper] ${msg.from}: ${msg.text}`;
                
                box.innerHTML += `
                    <div class="post private-msg">
                        <div class="post-meta">${msg.time}</div>
                        <div>${displayTxt}</div>
                    </div>`;
                box.scrollTop = box.scrollHeight;
            });
        }
    </script>
</body>
</html>
